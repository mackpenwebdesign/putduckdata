<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-f"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-f" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <radialGradient id="face-f" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F5C5A3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-f)"/>

  <!-- Body / shirt -->
  <ellipse cx="100" cy="195" rx="62" ry="44" fill="#312e81" clip-path="url(#circle-f)"/>
  <ellipse cx="100" cy="188" rx="52" ry="34" fill="#1e1b4b" clip-path="url(#circle-f)"/>

  <!-- Neck -->
  <rect x="88" y="138" width="24" height="22" rx="8" fill="url(#face-f)"/>

  <!-- Head -->
  <ellipse cx="100" cy="112" rx="38" ry="42" fill="url(#face-f)"/>

  <!-- Hair — golden/chestnut brown -->
  <ellipse cx="100" cy="75" rx="38" ry="22" fill="#92400e"/>
  <ellipse cx="100" cy="70" rx="34" ry="18" fill="#92400e"/>
  <!-- Hair sides -->
  <ellipse cx="67" cy="103" rx="10" ry="18" fill="#92400e"/>
  <ellipse cx="133" cy="103" rx="10" ry="18" fill="#92400e"/>
  <!-- Hair top fill -->
  <path d="M66 85 Q100 55 134 85 Q130 62 100 57 Q70 62 66 85Z" fill="#92400e"/>
  <!-- Hair highlight -->
  <path d="M84 65 Q100 59 116 65" stroke="#b45309" stroke-width="3" opacity="0.6" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M80 101 Q88 97 96 100" stroke="#78350f" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M104 100 Q112 97 120 101" stroke="#78350f" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="88" cy="109" rx="6.5" ry="6" fill="#fff"/>
  <ellipse cx="112" cy="109" rx="6.5" ry="6" fill="#fff"/>
  <circle cx="89" cy="110" r="4" fill="#3b2507"/>
  <circle cx="113" cy="110" r="4" fill="#3b2507"/>
  <circle cx="90.5" cy="108.5" r="1.2" fill="#fff"/>
  <circle cx="114.5" cy="108.5" r="1.2" fill="#fff"/>

  <!-- Nose -->
  <path d="M97 116 Q100 125 103 116" stroke="#d4956a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="96" cy="123" rx="3" ry="2" fill="#d4956a" opacity="0.45"/>
  <ellipse cx="104" cy="123" rx="3" ry="2" fill="#d4956a" opacity="0.45"/>

  <!-- Smile -->
  <path d="M86 131 Q100 143 114 131" stroke="#c27a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks blush -->
  <ellipse cx="74" cy="122" rx="8" ry="5" fill="#f87171" opacity="0.2"/>
  <ellipse cx="126" cy="122" rx="8" ry="5" fill="#f87171" opacity="0.2"/>

  <!-- Ears -->
  <ellipse cx="62" cy="112" rx="7" ry="9" fill="url(#face-f)"/>
  <ellipse cx="138" cy="112" rx="7" ry="9" fill="url(#face-f)"/>
  <ellipse cx="62" cy="112" rx="4" ry="6" fill="#e8a882" opacity="0.5"/>
  <ellipse cx="138" cy="112" rx="4" ry="6" fill="#e8a882" opacity="0.5"/>
</svg>
