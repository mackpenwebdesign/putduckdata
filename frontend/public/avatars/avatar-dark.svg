<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-d"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-d" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="face-d" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-d)"/>

  <!-- Body / shirt -->
  <ellipse cx="100" cy="195" rx="62" ry="44" fill="#1e293b" clip-path="url(#circle-d)"/>
  <ellipse cx="100" cy="188" rx="52" ry="34" fill="#0f172a" clip-path="url(#circle-d)"/>

  <!-- Neck -->
  <rect x="88" y="138" width="24" height="22" rx="8" fill="url(#face-d)"/>

  <!-- Head -->
  <ellipse cx="100" cy="112" rx="38" ry="42" fill="url(#face-d)"/>

  <!-- Hair -->
  <ellipse cx="100" cy="75" rx="38" ry="22" fill="#1a0d06"/>
  <ellipse cx="100" cy="70" rx="34" ry="18" fill="#1a0d06"/>
  <!-- Hair sides -->
  <ellipse cx="67" cy="103" rx="10" ry="18" fill="#1a0d06"/>
  <ellipse cx="133" cy="103" rx="10" ry="18" fill="#1a0d06"/>
  <!-- Hair top fill -->
  <path d="M66 85 Q100 55 134 85 Q130 62 100 57 Q70 62 66 85Z" fill="#1a0d06"/>

  <!-- Eyebrows -->
  <path d="M80 101 Q88 97 96 100" stroke="#1a0d06" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M104 100 Q112 97 120 101" stroke="#1a0d06" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="88" cy="109" rx="6.5" ry="6" fill="#fff"/>
  <ellipse cx="112" cy="109" rx="6.5" ry="6" fill="#fff"/>
  <circle cx="89" cy="110" r="4" fill="#2c1a0e"/>
  <circle cx="113" cy="110" r="4" fill="#2c1a0e"/>
  <circle cx="90.5" cy="108.5" r="1.2" fill="#fff"/>
  <circle cx="114.5" cy="108.5" r="1.2" fill="#fff"/>

  <!-- Nose -->
  <path d="M97 116 Q100 125 103 116" stroke="#6B4226" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="96" cy="123" rx="3" ry="2" fill="#6B4226" opacity="0.5"/>
  <ellipse cx="104" cy="123" rx="3" ry="2" fill="#6B4226" opacity="0.5"/>

  <!-- Smile -->
  <path d="M86 131 Q100 143 114 131" stroke="#5a2d0c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="62" cy="112" rx="7" ry="9" fill="url(#face-d)"/>
  <ellipse cx="138" cy="112" rx="7" ry="9" fill="url(#face-d)"/>
  <ellipse cx="62" cy="112" rx="4" ry="6" fill="#7a4830" opacity="0.5"/>
  <ellipse cx="138" cy="112" rx="4" ry="6" fill="#7a4830" opacity="0.5"/>
</svg>
